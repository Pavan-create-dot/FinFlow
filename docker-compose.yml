services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=finflow_user
      - POSTGRES_PASSWORD=finflow_pass
      - POSTGRES_DB=finflow_db
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'

volumes:
  db-data:
