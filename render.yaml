services:
  # 1. Express API Web Service
  - type: web
    name: finflow-api
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: finflow-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: finflow-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # 2. BullMQ PDF Processing Worker (Background Service)
  - type: worker
    name: finflow-worker
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    dockerCommand: node dist/workers/pdfWorker.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: finflow-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: finflow-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false

databases:
  - name: finflow-db
    plan: free

  # 3. Managed Redis Instance
  - type: redis
    name: finflow-redis
    plan: free
    ipAllowList: []
