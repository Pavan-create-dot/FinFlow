name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: finflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Lint TypeScript
      run: npx tsc --noEmit
      continue-on-error: true

    - name: Check for syntax errors
      run: npm run build 2>/dev/null || true
      continue-on-error: true

    - name: Verify API startup
      run: timeout 5 npm run dev || true
      env:
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/finflow_test
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_ACCESS_SECRET: test_secret_access
        JWT_REFRESH_SECRET: test_secret_refresh
        GEMINI_API_KEY: test_key
        ENCRYPTION_SECRET: abcdefghijklmnopqrstuvwxyz123456
        PORT: 3000
